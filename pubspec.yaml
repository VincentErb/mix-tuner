name: guitaleletuner
description: A guitar/guitalele tuner app with real-time pitch detection.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Pitch detection — YIN algorithm, pure Dart
  pitch_detector_dart: ^0.0.7

  # Microphone audio capture — PCM16 streaming
  record: ^6.0.0

  # Runtime permissions (mic) — Android + iOS unified API
  permission_handler: ^12.0.1

  # State management
  flutter_riverpod: ^2.6.1

  # Persistence (selected tuning)
  shared_preferences: ^2.5.5

  # Fonts for dark UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
