name: mix_tuner
description: A real-time instrument tuner app for guitar, bass, ukulele and guitalele.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Microphone audio capture — PCM16 streaming
  record: ^6.0.0

  # Runtime permissions (mic) — Android + iOS unified API
  permission_handler: ^12.0.1

  # State management
  flutter_riverpod: ^2.6.1

  # Persistence (selected tuning)
  shared_preferences: ^2.5.5

  # Fonts for dark UI
  google_fonts: ^6.2.1

  # Keep screen on while tuning
  wakelock_plus: ^1.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0f1830"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
