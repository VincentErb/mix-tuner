name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.41.7"

jobs:
  build-release:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties << 'EOF'
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - run: flutter build apk --release

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/mix-tuner-${{ github.ref_name }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/mix-tuner-${{ github.ref_name }}.apk
          retention-days: 90

      - name: Cleanup secrets from runner
        if: always()
        run: rm -f android/app/release.jks android/key.properties

      - if: always()
        run: |
          echo "## Release Build" >> $GITHUB_STEP_SUMMARY
          echo "Tag: \`${{ github.ref_name }}\` | APK: \`mix-tuner-${{ github.ref_name }}.apk\`" >> $GITHUB_STEP_SUMMARY

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" ${PREV}..HEAD)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mix Tuner ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ## Installation
            Download `mix-tuner-${{ github.ref_name }}.apk` below and sideload on Android (enable "Install from unknown sources" in device settings).

            **Full Changelog:** https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}
          files: dist/mix-tuner-${{ github.ref_name }}.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: true
